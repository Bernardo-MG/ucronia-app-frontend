<p-card>

  <div class="ms-3 space-y-5">

    <!-- Username -->
    <div>
      <ui-detail-field [loading]="loading" icon="pi pi-user" name="Nombre de usuario" [value]="account.username" />
    </div>

    <!-- Name -->
    <div>
      <ui-detail-field [loading]="loading" icon="pi pi-user" name="Nombre" [value]="account.name" />
    </div>

    <!-- Email -->
    <div>
      <ui-detail-field [loading]="loading" icon="pi pi-envelope" name="E-mail" [value]="account.email" />
    </div>

  </div>

</p-card>

@if (account.profile) {
  <article class="p-4">
    <header>
      <h2 class="border-bottom">Socio</h2>
    </header>
    <p-card>
      <account-profile-info [data]="profile" />
    </p-card>
  </article>
}
