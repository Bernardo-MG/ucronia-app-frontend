<p-table lazy="true" dataKey="number" [loading]="loading()" [value]="data()" paginator="true" [rows]="rows()"
  [totalRecords]="totalRecords()" [first]="first" showCurrentPageReport="true"
  currentPageReportTemplate="Total: {totalRecords}" (onPage)="onPageChange($event)">

  <ng-template #header>
    <tr class="border-b bg-gray-100">
      <th pSortableColumn="description" class="py-3 px-4 text-left font-medium text-gray-700">
        Descripción
        <p-sortIcon field="description"></p-sortIcon>
      </th>
      <th pSortableColumn="amount" class="py-3 px-4 text-left font-medium text-gray-700">
        Importe
        <p-sortIcon field="amount"></p-sortIcon>
      </th>
      <th pSortableColumn="amount" class="py-3 px-4 text-left font-medium text-gray-700">
        Fecha
        <p-sortIcon field="amount"></p-sortIcon>
      </th>
      <th></th>
    </tr>
  </ng-template>

  <ng-template #body let-transaction>
    <tr>
      <td>{{ transaction.description }}</td>
      <td>{{ transaction.amount }}</td>
      <td>{{ transaction.date | date:'yyyy-MM-dd' }}</td>
      <td class="w-40">
        <p-button icon="pi pi-eye" severity="secondary" aria-label="Ver" (click)="show.emit(transaction.index)" rounded
          text />
      </td>
    </tr>
  </ng-template>
</p-table>
