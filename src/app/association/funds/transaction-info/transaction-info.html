<!-- Index -->

<div class="ms-3 space-y-5">

  <!-- Index -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-hashtag" name="Índice" [value]="transaction().index" />
  </div>

  <!-- Date -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-calendar" name="Fecha" [value]="transaction().date | date:'yyyy-MM-dd'" />
  </div>

  <!-- Description -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-align-left" name="Descripción" [value]="transaction().description" />
  </div>

  <!-- Amount -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-euro" name="Importe" [value]="transaction().amount" />
  </div>

</div>
