<div class="p-4 space-y-6">
  <h1 class="text-4xl font-bold">Directorio</h1>

  <div class="flex justify-center">
    <p-card>
      <assoc-membership-evolution-chart-view />
    </p-card>
  </div>

  <!-- Summary Cards -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6 place-items-center">
    <ui-summary-card [loading]="status.loadingSummary" [value]="summary.members" label="Socios" icon="pi pi-user" />
    <ui-summary-card [loading]="status.loadingSummary" [value]="summary.guests" label="Invitados"
      icon="pi pi-user-plus" />
    <ui-summary-card [loading]="status.loadingSummary" [value]="summary.sponsors" label="Esponsors" icon="pi pi-star" />
  </div>

  <!-- Buttons -->
  <div class="flex flex-wrap mb-3 items-center w-full space-x-2">
    <assoc-profile-status-selector (filter)="onChangeStatusFilter($event)" />

    @if(filter.type === 'member') {
      <assoc-member-status-selector [status]="filter.status" (filter)="onChangeMemberStatus($event)" />
    }

    <ui-text-filter (filter)="onFilter($event)" />

    @if (permissions.create) {
      <div class="ml-auto space-x-2">
        <p-button icon="pi pi-plus-circle" (click)="status.creating = true" [disabled]="!permissions.create"
          aria-label="Nuevo perfil" [attr.aria-disabled]="!permissions.create" rounded />
      </div>
    }
  </div>

  <!-- Contact List -->
  <p-panel class="bg-white shadow rounded-lg">

    @if(filter.type === 'member') {
      <assoc-member-profile-list [loading]="status.loading" [editable]="permissions.edit" [deletable]="permissions.delete"
        [profiles]="profiles.content" [rows]="profiles.size" [page]="profiles.page" [totalRecords]="profiles.totalElements"
        (show)="onShowInfo($event)" (edit)="onShowEdit($event)" (delete)="onDelete($event)"
        (changeDirection)="onChangeDirection($event)" (changePage)="load($event)" />
    } @else if(filter.type === 'sponsor') {
      <assoc-sponsor-list [loading]="status.loading" [editable]="permissions.edit" [deletable]="permissions.delete"
        [profiles]="profiles.content" [rows]="profiles.size" [page]="profiles.page" [totalRecords]="profiles.totalElements"
        (show)="onShowInfo($event)" (edit)="onShowEdit($event)" (delete)="onDelete($event)"
        (changeDirection)="onChangeDirection($event)" (changePage)="load($event)" />
    } @else if(filter.type === 'guest') {
      <assoc-guest-list [loading]="status.loading" [editable]="permissions.edit" [deletable]="permissions.delete"
        [profiles]="profiles.content" [rows]="profiles.size" [page]="profiles.page" [totalRecords]="profiles.totalElements"
        (show)="onShowInfo($event)" (edit)="onShowEdit($event)" (delete)="onDelete($event)"
        (changeDirection)="onChangeDirection($event)" (changePage)="load($event)" />
    } @else {
      <assoc-profile-list [loading]="status.loading" [editable]="permissions.edit" [deletable]="permissions.delete"
        [profiles]="profiles.content" [rows]="profiles.size" [page]="profiles.page" [totalRecords]="profiles.totalElements"
        (show)="onShowInfo($event)" (edit)="onShowEdit($event)" (delete)="onDelete($event)"
        (changeDirection)="onChangeDirection($event)" (changePage)="load($event)" />
    }

  </p-panel>

  <!-- Contact methods -->
  <assoc-contact-method-list-inner-view />

  <!-- Fee types -->
  <assoc-fee-type-list-inner-view />

  <!-- Profile details dialog -->
  <p-dialog header="Perfil" [modal]="true" [(visible)]="status.showing" [style]="{ width: '50rem' }">
    <assoc-profile-info [data]="selectedData" [loading]="status.loading" />
  </p-dialog>

  <!-- Creation dialog -->
  <p-dialog header="Crear perfil" [modal]="true" [(visible)]="status.creating" [style]="{ width: '40rem' }">
    @if(status.creating) {
      <assoc-profile-creation-form [loading]="status.loading" [failures]="failures" (save)="onCreate($event)" />
    }
  </p-dialog>

  <!-- Edition dialog -->
  <p-dialog header="Editar perfil" [modal]="true" [(visible)]="status.editing" [style]="{ width: '50rem' }">
    <assoc-profile-info-edition-form [loading]="status.loading" [data]="selectedData" [feeTypes]="feeTypes"
      [failures]="failures" [contactMethods]="contactMethodSelection" (save)="onUpdate($event)" />
  </p-dialog>

</div>
