<p-panel [toggleable]="true" [collapsed]="true">
  <ng-template #header>
    <div class="flex items-center gap-2 px-2">
      <span class="pi pi-history"></span>
      <span class="font-bold">Tipos de cuota</span>
    </div>
  </ng-template>
  <ng-template #icons>
    <p-button icon="pi pi-plus-circle" (click)="dialog = Dialog.CREATE" [disabled]="!permissions.create"
      aria-label="Nuevo perfil" [attr.aria-disabled]="!permissions.create" rounded text />
  </ng-template>
  <p class="m-0">
    <assoc-fee-type-list [loading]="loading" [editable]="permissions.edit" [deletable]="permissions.delete"
      [data]="feeTypeData.content" [rows]="feeTypeData.size" [page]="feeTypeData.page"
      [totalRecords]="feeTypeData.totalElements" (edit)="onShowEditFeeType($event)" (delete)="onDeleteFeeType($event)"
      (changePage)="load($event)" />
  </p>
</p-panel>

<p-drawer [visible]="dialog !== Dialog.NONE" (visibleChange)="onDrawerVisibleChange($event)" [closable]="false" position="right" [style]="{ width: '60vw' }">
  @switch (dialog) {

    @case(Dialog.CREATE) {
      <ng-template #header>
        Crear tipo de cuota
      </ng-template>
      <div class="w-full">
        <assoc-fee-type-form [loading]="loading" [failures]="failures" (save)="onCreateFeeType($event)" />
      </div>
    }

    @case(Dialog.EDIT) {
      <ng-template #header>
        Editar tipo de cuota
      </ng-template>
      <div class="w-full">
        <assoc-fee-type-form [loading]="loading" [data]="selectedData" [failures]="failures"
          (save)="onUpdateFeeType($event)" />
      </div>
      <ng-template #footer>
        <p-button icon="pi pi-times" severity="secondary" (click)="dialog = Dialog.NONE" rounded text class="!p-2" />
      </ng-template>
    }

  }
</p-drawer>
