@if(member().active) {
  @if(member().renew) {
    <p-tag icon="pi pi-check" value="Activo" severity="success" badgeSize="small" />
  } @else {
    <p-tag icon="pi pi-replay" value="No renueva" severity="warn" badgeSize="small" />
  }
} @else {
  <p-tag icon="pi pi-check" value="Baja" severity="danger" badgeSize="small" />
}
