<p-table lazy="true" dataKey="number" [loading]="loading()" [value]="profiles()" paginator="true" [rows]="rows()"
  [totalRecords]="totalRecords()" [first]="first" showCurrentPageReport="true"
  currentPageReportTemplate="Total: {totalRecords}" (onSort)="changeDirection.emit($event)"
  (onPage)="onPageChange($event)">
  <ng-template #header>
    <tr>
      <th pSortableColumn="fullName">Nombre <p-sortIcon field="fullName" /></th>
      <th>Partidas</th>
      <th class="w-40"></th>
    </tr>
  </ng-template>
  <ng-template #body let-profile>
    <tr>
      <td>
        {{ profile.name.fullName }}
      </td>
      <td>
        <ul class="m-0 p-0 list-none">
          @for (game of profile.games; track game) {
            <li>
              {{ game | date:'yyyy-MM-dd' }}
            </li>
          }
        </ul>
      </td>
      <td class="w-40">
        <p-button icon="pi pi-eye" severity="secondary" aria-label="Ver" (click)="show.emit(profile)" rounded text />
      </td>
    </tr>
  </ng-template>
</p-table>
