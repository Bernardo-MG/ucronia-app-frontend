<!-- Contact methods -->
<p-panel [toggleable]="true" [collapsed]="true">
  <ng-template #header>
    <div class="flex items-center gap-2 px-2">
      <span class="pi pi-phone"></span>
      <span class="font-bold">Métodos de contacto</span>
    </div>
  </ng-template>
  <ng-template #icons>
    <p-button icon="pi pi-plus-circle" (click)="dialog = Dialog.CREATE" [disabled]="!permissions.create"
      aria-label="Nuevo perfil" [attr.aria-disabled]="!permissions.create" rounded text />
  </ng-template>
  <p class="m-0">
    <assoc-contact-method-list [loading]="loading" [editable]="permissions.edit" [deletable]="permissions.delete"
      [data]="contactMethodData.content" [rows]="contactMethodData.size" [page]="contactMethodData.page"
      [totalRecords]="contactMethodData.totalElements" (edit)="onShowEdit($event)"
      (delete)="onDelete($event)" (changePage)="load($event)" />
  </p>
</p-panel>

<p-drawer [visible]="dialog !== Dialog.NONE" (visibleChange)="onDrawerVisibleChange($event)" [closable]="false" position="right" [style]="{ width: '60vw' }">
  @switch (dialog) {

    @case (Dialog.CREATE) {
      <ng-template #header>
        Crear método de contacto
      </ng-template>
      <div class="w-full">
        <assoc-contact-method-form [loading]="loading" [failures]="failures" (save)="onCreate($event)" />
      </div>
    }

    @case (Dialog.EDIT) {
      <ng-template #header>
        Editar método de contacto
      </ng-template>
      <div class="w-full">
        <assoc-contact-method-form [loading]="loading" [data]="selectedData" [failures]="failures"
          (save)="onUpdate($event)" />
      </div>
      <ng-template #footer>
        <p-button icon="pi pi-times" severity="secondary" (click)="dialog = Dialog.NONE" rounded text class="!p-2" />
      </ng-template>
    }

  }
</p-drawer>
