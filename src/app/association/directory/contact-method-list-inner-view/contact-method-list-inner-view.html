<!-- Contact methods -->
<p-panel [toggleable]="true" [collapsed]="true">
  <ng-template #header>
    <div class="flex items-center gap-2 px-2">
      <span class="pi pi-phone"></span>
      <span class="font-bold">Métodos de contacto</span>
    </div>
  </ng-template>
  <ng-template #icons>
    <p-button icon="pi pi-plus-circle" (click)="dialog = Dialog.CREATE" [disabled]="!permissions.create"
      aria-label="Nuevo perfil" [attr.aria-disabled]="!permissions.create" rounded text />
  </ng-template>
  <p class="m-0">
    <assoc-contact-method-list [loading]="loading" [editable]="permissions.edit" [deletable]="permissions.delete"
      [data]="contactMethodData.content" [rows]="contactMethodData.size" [page]="contactMethodData.page"
      [totalRecords]="contactMethodData.totalElements" (edit)="onShowEditContactMethod($event)"
      (delete)="onDeleteContactMethod($event)" (changePage)="load($event)" />
  </p>
</p-panel>

@switch (dialog) {

  @case (Dialog.CREATE) {
    <!-- Contact method creation dialog -->
    <p-dialog header="Crear método de contacto" [modal]="true" [visible]="true" (visibleChange)="onDialogVisibleChange($event)" [style]="{ width: '50rem' }">
      <assoc-contact-method-form [loading]="loading" [failures]="failures" (save)="onCreateContactMethod($event)" />
    </p-dialog>
  }

  @case (Dialog.EDIT) {
    <!-- Contact method edition dialog -->
    <p-dialog header="Editar método de contacto" [modal]="true" [visible]="true" (visibleChange)="onDialogVisibleChange($event)" [style]="{ width: '50rem' }">
      <assoc-contact-method-form [loading]="loading" [data]="selectedData" [failures]="failures"
        (save)="onUpdateContactMethod($event)" />
    </p-dialog>
  }

}
