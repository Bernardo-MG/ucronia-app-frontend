<form [formGroup]="form" (ngSubmit)="onSave()" novalidate>
  <!-- Donation date -->
  <p-floatlabel variant="in">
    <p-datepicker
      dateFormat="yy-mm-dd"
      [invalid]="isFieldInvalid('date')"
      id="dateInput"
      formControlName="date"
      appendTo="body" />
    <label for="dateInput">Fecha de donación</label>
  </p-floatlabel>

  <div class="mb-2">
    @for (failure of failures().getFailures('date'); track failure) {
      <p-message severity="error" size="small" variant="simple">
        {{ failure.message }}
      </p-message>
    }
  </div>

  <!-- Donor search -->
  <div class="mb-4">
    <label class="font-semibold mb-2 block">Donante</label>

    <assoc-member-search
      [member]="donorSearchValue"
      [members]="donors()"
      (selectMember)="onSelectMember($event)"
      (searchMember)="searchDonor.emit($event)" />

    <div class="mb-2">
      @if (isFieldInvalid('donors')) {
        <p-message severity="error" size="small" variant="simple">
          Seleccione al menos un donante válido
        </p-message>
      }
    </div>
  </div>

  <!-- Donors -->
  <div class="row mb-2">
    <table class="table">
      <thead>
        <tr>
          <th scope="col"></th>
          <th scope="col">Nombre</th>
        </tr>
      </thead>

      <tbody class="table-group-divider">
        @for (donor of selectedDonors; track donor.number) {
          <tr>
            <td>
              <p-button
                icon="pi pi-trash text-danger"
                (click)="onRemoveDonor(donor)"
                rounded
                text />
            </td>
            <td>{{ donor.name.fullName }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <p-button
    type="submit"
    name="Guardar"
    [loading]="loading()"
    [disabled]="!formStatus.saveEnabled"
    [attr.aria-disabled]="!formStatus.saveEnabled">
    Guardar
  </p-button>
</form>
