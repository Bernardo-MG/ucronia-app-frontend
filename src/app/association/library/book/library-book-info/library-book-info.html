<div class="ms-3 space-y-5">

  <!-- Number -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-hashtag" name="Número" [value]="book().number" />
  </div>

  <!-- ISBN -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-hashtag" name="ISBN" [value]="book().isbn" />
  </div>

  <!-- Title -->
  <div class="flex gap-3 items-center">
    <i class="pi pi-book"></i>
    <div>
      <p class="text-gray-500 text-sm">Título</p>

      @if (loading()) {
        <p-skeleton />
      } @else {
        <sup class="text-sm">{{book().title.supertitle}}</sup>
        <span class="font-medium">{{book().title.title}}</span>
        <sub class="text-sm">{{book().title.subtitle}}</sub>
      }
    </div>
  </div>

  <!-- Language -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-flag" name="Idioma" [value]="language" />
  </div>

  <!-- Publish Date -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-calendar" name="Fecha de publicación"
      [value]="book().publishDate | date:'yyyy-MM-dd'" />
  </div>

  <!-- Authors -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-user" name="Autores" [value]="authors" />
  </div>

  <!-- Publishers -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-user" name="Editores" [value]="publishers" />
  </div>

  <!-- Book Type -->
  @if(bookType) {
    <div>
      <ui-detail-field [loading]="loading()" icon="pi pi-user" name="Tipo" [value]="bookType.name" />
    </div>
  }

  <!-- Game System -->
  @if(gameSystem) {
    <div>
      <ui-detail-field [loading]="loading()" icon="pi pi-user" name="Sistema" [value]="gameSystem.name" />
    </div>
  }

  <!-- Donation Date -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-calendar" name="Fecha de donación"
      [value]="book().donation?.date | date:'yyyy-MM-dd'" />
  </div>

  <!-- Donors -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-user" name="Donante" [value]="donors" />
  </div>

</div>

<!-- Lendings -->
<ng-template #header>
  <span class="text-lg font-semibold">Préstamos</span>
</ng-template>
<assoc-library-book-lendings [lendings]="book().lendings" />
