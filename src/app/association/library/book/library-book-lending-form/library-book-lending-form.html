<form [formGroup]="form" (ngSubmit)="onSave()" novalidate>
  <div class="mb-4">
    <!-- Member -->
    <label class="font-semibold mb-2 block">Socio</label>
    <assoc-member-search [members]="members()" (selectMember)="onSelectMember($event)"
      (searchMember)="searchMember.emit($event)" />
    <div class="mb-2">
      @if (isFieldInvalid('borrower')) {
        <p-message severity="error" size="small" variant="simple">
          Seleccione un socio válido
        </p-message>
      }
    </div>
  </div>
  <!-- Lending date -->
  <p-floatlabel variant="in" class="mb-2 d-flex">
    <p-datepicker id="lendingDateInput" formControlName="lendingDate" [invalid]="isFieldInvalid('lendingDate')"
      dateFormat="yy-mm-dd" [maxDate]="today" appendTo="body" />
    <label for="lendingDateInput">Fecha</label>
  </p-floatlabel>
  <div class="mb-2">
    @for (failure of failures().getFailures('lendingDate'); track failure) {
      <p-message severity="error" size="small" variant="simple">
        {{failure.message}}
      </p-message>
    }
  </div>

  <!-- Save button -->
  <p-button type="submit" name="Guardar" [loading]="loading()" [disabled]="!formStatus.saveEnabled"
    [attr.aria-disabled]="!formStatus.saveEnabled">Guardar</p-button>
</form>
