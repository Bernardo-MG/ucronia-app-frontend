<div class="mb-4">
  <p-button icon="pi pi-plus-circle" severity="secondary" [disabled]="!createable" aria-label="Nuevo"
    [attr.aria-disabled]="!createable" rounded text (click)="openCreate()" />
</div>
<shared-crud-name-list [data]="data" [loading]="loading" [editable]="editable" [deletable]="deletable"
  (show)="openView($event)" (startEditing)="openEdit($event)" (sortChange)="onSort($event)" (pageChange)="load($event)"></shared-crud-name-list>

<p-drawer [(visible)]="showForm" [closable]="false" position="right">
  @switch (view) {
    @case (View.VIEW) {
      <ng-template #header>
        Ver editor
      </ng-template>
      <div class="mb-4">
        <p><strong>Nombre:</strong> {{ selected?.name }}</p>
      </div>
      <ng-template #footer>
        <p-button icon="pi pi-pencil" [disabled]="!editable" (click)="openEdit(selected)" rounded text />
        <p-button icon="pi pi-trash" severity="danger" [disabled]="!deletable" (click)="confirmDelete($event, selected?.number)" rounded text />
      </ng-template>
    }
    @case (View.CREATION) {
      <ng-template #header>
        Crear editor
      </ng-template>
      <shared-name-form [loading]="loading" [failures]="failures"
        (save)="onSave($event)" (reject)="onReject()"></shared-name-form>
    }
    @case (View.EDITION) {
      <ng-template #header>
        Modificar editor
      </ng-template>
      <shared-name-form [data]="selected" [loading]="loading" [failures]="failures"
        (save)="onSave($event)" (reject)="onReject()"></shared-name-form>
      <ng-template #footer>
        <p-button icon="pi pi-times" severity="secondary" (click)="onCancelEdit()" rounded text />
      </ng-template>
    }
  }
</p-drawer>
