<shared-crud-name-list [data]="data" [loading]="loading" [createable]="createable" [editable]="editable" [deletable]="deletable"
  (startCreating)="openCreate()" (startEditing)="openEdit($event)" (deleted)="onDelete($event)" (sortChange)="onSort($event)" (pageChange)="load($event)"></shared-crud-name-list>

<p-drawer [(visible)]="showForm" [closable]="false" position="right">
  @switch (view) {
    @case (View.CREATION) {
      <ng-template #header>
        Crear sistema
      </ng-template>
      <shared-name-form [loading]="loading" [failures]="failures"
        (save)="onSave($event)" (reject)="onReject()"></shared-name-form>
    }
    @case (View.EDITION) {
      <ng-template #header>
        Modificar sistema
      </ng-template>
      <shared-name-form [data]="selected" [loading]="loading" [failures]="failures"
        (save)="onSave($event)" (reject)="onReject()"></shared-name-form>
    }
  }
</p-drawer>
