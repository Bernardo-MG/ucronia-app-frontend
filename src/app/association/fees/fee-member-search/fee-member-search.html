<p-autocomplete name="memberSearch" [suggestions]="members()" optionLabel="name.fullName" dataKey="number"
  [forceSelection]="true" placeholder="Buscar socio..." (completeMethod)="searchMember.emit({ query: $event.query })"
  (onSelect)="selectMember.emit($event.value)" appendTo="body">
  <ng-template let-item pTemplate="item">
    <span>{{ item.name.fullName }}</span>
  </ng-template>
</p-autocomplete>
