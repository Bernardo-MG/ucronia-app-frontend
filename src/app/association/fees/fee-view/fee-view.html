<div class="p-4 space-y-6">
  <p-menu #feeCreationMenu [model]="creationItems" [popup]="true" />

  <!-- Summary Cards -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6 place-items-center">
    <ui-summary-card [loading]="status.loadingSummary" [value]="summary.paid" label="Cuotas pagadas" icon="pi pi-check-circle"/>
    <ui-summary-card [loading]="status.loadingSummary" [value]="summary.unpaid" label="Sin pagar" icon="pi pi-times-circle"/>
  </div>

  <!-- Buttons -->
  <div class="flex flex-wrap mb-3 items-center w-full space-x-2">
    <assoc-member-status-selector [status]="filter.status" (filter)="onChangeMemberStatus($event)" />
    @if (permissions.create) {
      <div class="ml-auto space-x-2">
        <p-button icon="pi pi-plus-circle" (click)="feeCreationMenu.toggle($event)" [disabled]="!permissions.create"
          aria-label="Nueva cuota" [attr.aria-disabled]="!permissions.create" rounded />
      </div>
    }
  </div>

  <!-- Fee Calendar Panel -->
  <div class="w-full">
    <p-panel class="shadow rounded-lg">

      <!-- Calendar -->
      <assoc-fee-calendar [year]="filter.year" [range]="filter.range" [loading]="status.loadingCalendar" [feeCalendar]="feeCalendar"
        (goToYear)="loadCalendar($event)" (selectFee)="onSelectFee($event)" />

    </p-panel>
  </div>

  <!-- Fee Drawer -->
  <p-drawer [visible]="dialog !== Dialog.NONE" (visibleChange)="onDrawerVisibleChange($event)" [closable]="false" position="right" class="rounded-lg">
    @switch (dialog) {

      @case(Dialog.INFO) {
        <ng-template #header>
          Cuota
        </ng-template>
        <div class="w-full p-4 space-y-4">
          <assoc-fee-info [data]="selectedData" [loading]="status.loadingDetail" />
        </div>
        <ng-template #footer>
          <p-button icon="pi pi-pencil" severity="secondary" [disabled]="!permissions.edit" aria-label="Editar"
            [attr.aria-disabled]="!permissions.edit" (click)="dialog = Dialog.EDITION" rounded text class="!p-2" />

          <p-button icon="pi pi-trash" severity="danger" [disabled]="!permissions.delete" aria-label="Borrar"
            [attr.aria-disabled]="!permissions.delete" (click)="onDelete($event, selectedData)" rounded text class="!p-2" />
        </ng-template>
      }

      @case(Dialog.CREATE) {
        <ng-template #header>
          Crear cuota sin pagar
        </ng-template>
        <div class="w-full p-4">
          <assoc-fee-creation-form [loading]="status.loadingDetail" [failures]="failures" [members]="members"
            (save)="onCreateUnpaid($event)" (searchMember)="onSearchMembers($event)" />
        </div>
        <ng-template #footer>
          <p-button icon="pi pi-times" severity="secondary" (click)="dialog = Dialog.NONE" rounded text class="!p-2" />
        </ng-template>
      }

      @case(Dialog.PAY) {
        <ng-template #header>
          Pagar cuota
        </ng-template>
        <div class="w-full p-4">
          <assoc-fee-payments-form [loading]="status.loadingDetail" [failures]="failures" [members]="members" (save)="onPay($event)"
            (searchMember)="onSearchMembers($event)" />
        </div>
        <ng-template #footer>
          <p-button icon="pi pi-times" severity="secondary" (click)="dialog = Dialog.NONE" rounded text class="!p-2" />
        </ng-template>
      }

      @case(Dialog.EDITION) {
        <ng-template #header>
          Editar cuota
        </ng-template>
        <div class="w-full p-4">
          <assoc-fee-edition-form [loading]="status.loadingDetail" [data]="selectedData" [failures]="failures"
            (save)="onUpdate($event)" />
        </div>
        <ng-template #footer>
          <p-button icon="pi pi-times" severity="secondary" (click)="dialog = Dialog.NONE" rounded text class="!p-2" />
        </ng-template>
      }

    }
  </p-drawer>
</div>
