<div class="ms-3 space-y-5">
  <p-card class="w-60">
    <ui-status-detail icon="pi pi-check" falseIcon="pi pi-times" [loading]="loading()"
      [value]="data().paid" trueText="{{ data().transaction?.date | date:'yyyy-MM-dd' }}"
      falseText="Sin pagar" name="Pagada" />
  </p-card>

  <!-- Month -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-calendar" name="Mes"
      [value]="data().month | date:'yyyy-MM'" />
  </div>

  <!-- Member -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-user" name="Socio" [value]="data().member.name.fullName" />
  </div>

  <!-- Fee type -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-credit-card" name="Tipo de cuota"
      [value]="data().feeType.name + ' (' + data().feeType.amount + '€)'" />
  </div>

</div>
