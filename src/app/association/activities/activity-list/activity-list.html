<p-table lazy="true" dataKey="number" [loading]="loading()" [value]="data()" paginator="true" [rows]="rows()"
  [totalRecords]="totalRecords()" [first]="first" showCurrentPageReport="true"
  currentPageReportTemplate="Total: {totalRecords}" (onSort)="changeDirection.emit($event)"
  (onPage)="onPageChange($event)">
  <ng-template #header>
    <tr class="border-b bg-gray-100">
      <th pSortableColumn="date">
        Fechas
        <p-sortIcon field="date" />
      </th>
      <th pSortableColumn="title">
        Título
        <p-sortIcon field="title" />
      </th>
      <th>
      </th>
    </tr>
  </ng-template>
  <ng-template #body let-activity>
    <tr>
      <td>
        @for (date of activity.dates; track date) {
          <div>
            {{ date.start | date:'yyyy-MM-dd' }}
            ({{ date.start | date:'HH:mm' }} - {{ date.end | date:'HH:mm' }})
          </div>
        }
      </td>
      <td>{{ activity.title }}</td>
      <td class="w-40">
        <p-button icon="pi pi-eye" severity="secondary" aria-label="Ver" (click)="show.emit(activity)" rounded text />
      </td>
    </tr>
  </ng-template>
</p-table>
