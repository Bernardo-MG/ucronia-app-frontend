<div class="ms-3 space-y-5">

  <!-- Title -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-tag" name="Título" [value]="data().title" />
  </div>

  <!-- Description -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-align-left" name="Descripción" [value]="data().description" />
  </div>

  <!-- Start -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-calendar" name="Inicio" [value]="data().start | date:'yyyy-MM-dd'" />
  </div>

  <!-- End -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-calendar" name="Fin" [value]="data().end | date:'yyyy-MM-dd'" />
  </div>

</div>
