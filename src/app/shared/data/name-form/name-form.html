<form [formGroup]="form" (ngSubmit)="onSave()" novalidate class="w-full min-w-0">
  <!-- Name -->
  <p-floatlabel variant="in" class="mb-2 w-full min-w-0">
    <input pInputText type="text" id="nameInput" formControlName="name" class="w-full min-w-0" />
    <label for="nameInput">Nombre</label>
  </p-floatlabel>
  <div class="mb-2 w-full min-w-0">
    @for (failure of failures().getFailures('name'); track failure) {
      <p-message severity="error" size="small" variant="simple">
        {{failure.message}}
      </p-message>
    }
  </div>
  <!-- Save button -->
  <div class="mt-4 w-full min-w-0">
    <p-button type="submit" label="Guardar" [disabled]="!formStatus.saveEnabled"
      [attr.aria-disabled]="!formStatus.saveEnabled" class="w-full" />
  </div>
</form>
