<form [formGroup]="form" (ngSubmit)="onSave()" novalidate>
  <div class="row mb-3">
    <div class="col-sm-9">{{name}}</div>
  </div>

  <div class="mb-3">
    <p-select [options]="options" formControlName="number" optionLabel="name" optionValue="number"
      [placeholder]="placeholder()" [loading]="loadingOptions" (onChange)="onChoose($event.value)" appendTo="body" />
  </div>

  <div uiJustifyBetween>
    <p-button type="submit" name="Guardar" [disabled]="!formStatus.saveEnabled"
      [attr.aria-disabled]="!formStatus.saveEnabled">Guardar</p-button>
  </div>
</form>
