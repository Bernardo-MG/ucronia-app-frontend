<form [formGroup]="form" (ngSubmit)="onSave()" novalidate>
  <div class="mb-4">
    <p-inputgroup>
      <p-inputgroup-addon>
        <i class="pi pi-search"></i>
      </p-inputgroup-addon>
      <p-autocomplete name="selectionSearch" [ngModel]="searchValue" [suggestions]="searchResults" optionLabel="name"
        [ngModelOptions]="{ standalone: true }" dataKey="number" [forceSelection]="true"
        [placeholder]="searchPlaceholder()" (completeMethod)="onSearch($event)" (onSelect)="onChoose($event.value)"
        appendTo="body" />
    </p-inputgroup>
  </div>

  <p-table dataKey="number" [value]="rows">
    <ng-template #header>
      <tr>
        <th>Nombre</th>
        <th scope="col"></th>
      </tr>
    </ng-template>
    <ng-template #body let-row>
      <tr>
        <td>{{row.name}}</td>
        <td>
          <p-button icon="pi pi-trash" severity="danger" aria-label="Borrar" (click)="onRemove(row)" rounded text />
        </td>
      </tr>
    </ng-template>
  </p-table>

  <div uiJustifyBetween>
    <p-button type="submit" name="Guardar" [disabled]="!formStatus.saveEnabled"
      [attr.aria-disabled]="!formStatus.saveEnabled">Guardar</p-button>
  </div>
</form>
