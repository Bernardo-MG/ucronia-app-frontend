<div class="mb-3">
  <p-card>
    <div class="grid grid-cols-2 gap-4">

      <!-- Enabled -->
      <ui-status-detail icon="pi pi-power-off" [loading]="loading()" [value]="user().enabled" trueText="Activo"
        falseText="Inactivo" name="Activo" />

      <!-- Not Expired -->
      <ui-status-detail icon="pi pi-clock" [loading]="loading()" [value]="user().notExpired" trueText="No expirado"
        falseText="Expirado" name="Expiración" />

      <!-- Password Not Expired -->
      <ui-status-detail icon="pi pi-lock" [loading]="loading()" [value]="user().passwordNotExpired"
        trueText="Clave no expirada" falseText="Clave expirada" name="Expiración de clave" />

      <!-- Not Locked -->
      <ui-status-detail icon="pi pi-lock-open" [loading]="loading()" [value]="user().notLocked" trueText="Desbloqueado"
        falseText="Bloqueado" name="Bloqueo" />

    </div>
  </p-card>
</div>

<div class="ms-3 space-y-5">

  <!-- Username -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-user" name="Usuario" [value]="user().username" />
  </div>

  <!-- Name -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-user" name="Nombre" [value]="user().name" />
  </div>

  <!-- Email -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-envelope" name="E-mail" [value]="user().email" />
  </div>

  @if (member()) {
    <!-- Member -->
    <div>
      <ui-detail-field [loading]="loading()" icon="pi pi-user" name="E-mail" [value]="member().name.fullName" />
    </div>
  }

</div>
