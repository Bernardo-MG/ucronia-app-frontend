<div class="ms-3 space-y-5">

  <!-- Username -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-user" name="Usuario" [value]="user().username" />
  </div>

  <!-- Name -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-user" name="Nombre" [value]="user().name" />
  </div>

  <!-- Email -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-envelope" name="E-mail" [value]="user().email" />
  </div>

  @if (member()) {
    <!-- Member -->
    <div>
      <ui-detail-field [loading]="loading()" icon="pi pi-user" name="E-mail" [value]="member().name.fullName" />
    </div>
  }

  <!-- Enabled -->
  <div>
    <ui-boolean-detail-field [loading]="loading()" icon="pi pi-power-off" name="Activo" [value]="user().enabled" />
  </div>

  <!-- Expired -->
  <div>
    <ui-boolean-detail-field [loading]="loading()" icon="pi pi-clock" name="No expirado" [value]="user().notExpired" />
  </div>

  <!-- Password expired -->
  <div>
    <ui-boolean-detail-field [loading]="loading()" icon="pi pi-lock" name="Clave no expirada" [value]="user().passwordNotExpired" />
  </div>

  <!-- Locked -->
  <div>
    <ui-boolean-detail-field [loading]="loading()" icon="pi pi-lock-open" name="Desbloqueado" [value]="user().notLocked" />
  </div>

</div>
