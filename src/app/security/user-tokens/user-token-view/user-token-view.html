<p-card>
  <access-user-token-list [loading]="loading" [editable]="editable" [tokens]="data.content"
    [rows]="data.size" [page]="data.page" [totalRecords]="data.totalElements" (show)="onShowInfo($event)"
    (extend)="dialog = Dialog.EXTEND"
    (changeDirection)="onChangeDirection($event)"
    (changePage)="load($event)" />
</p-card>
@switch (dialog) {
  @case (Dialog.INFO) {
    <p-drawer [visible]="dialog === Dialog.INFO" (visibleChange)="onDrawerVisibleChange($event)" [closable]="false" position="right" [style]="{ width: '60vw' }">
      <ng-template #header>
        Token
      </ng-template>
      <div class="w-full p-4">
        <access-user-token-info [data]="selectedData" [loading]="loading" />
      </div>
      <ng-template #footer>
        <p-button icon="pi pi-times" severity="secondary" (click)="dialog = Dialog.NONE" rounded text class="!p-2" />
      </ng-template>
    </p-drawer>
  }
  @case (Dialog.EXTEND) {
    <p-drawer [visible]="dialog === Dialog.EXTEND" (visibleChange)="onDrawerVisibleChange($event)" [closable]="false" position="right" [style]="{ width: '60vw' }">
      <ng-template #header>
        Extender token
      </ng-template>
      <div class="w-full p-4">
        <p>Selecciona una nueva fecha:</p>
        <access-user-token-extend-form [expirationDate]="selectedData.expirationDate" [failures]="failures" (save)="onExtendExpiration($event)" />
      </div>
      <ng-template #footer>
        <p-button icon="pi pi-times" severity="secondary" (click)="dialog = Dialog.NONE" rounded text class="!p-2" />
      </ng-template>
    </p-drawer>
  }
}
