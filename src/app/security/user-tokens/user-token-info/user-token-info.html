<div class="mb-3">
  <p-card>
    <div class="grid grid-cols-2 gap-4">

      <!-- Consumed -->
      <ui-status-detail icon="pi pi-power-off" [loading]="loading()" [value]="data().consumed" trueText="Activo"
        falseText="Consumido" name="Consumido" />

      <!-- Revoked -->
      <ui-status-detail icon="pi pi-ban" [loading]="loading()" [value]="data().revoked" trueText="Vigente"
        falseText="Revocado" name="Revocado" />

    </div>
  </p-card>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

  <!-- Username -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-user" name="Usuario" [value]="data().username" />
  </div>

  <!-- Name -->
  <div>
    <ui-detail-field [loading]="loading()" icon="pi pi-user" name="Nombre" [value]="data().name" />
  </div>

</div>

<!-- Token -->
<div class="mt-6">
  <ui-detail-field [loading]="loading()" icon="pi pi-lock" name="Token" [value]="data().token" />
</div>

<!-- Scope -->
<div class="mt-6">
  <ui-detail-field [loading]="loading()" icon="pi pi-list-check" name="Alcance" [value]="data().scope" />
</div>

<!-- Creation date -->
<div class="mt-6">
  <ui-detail-field [loading]="loading()" icon="pi pi-calendar" name="Fecha de creación"
    [value]="data().creationDate | date:'yyyy-MM-dd HH:mm:ss'" />
</div>

<!-- Expiration date -->
<div class="mt-6">
  <ui-detail-field [loading]="loading()" icon="pi pi-calendar-clock" name="Fecha de expiración"
    [value]="data().expirationDate | date:'yyyy-MM-dd HH:mm:ss'" />
</div>
