<div class="p-4 space-y-6">
  <!-- Buttons -->
  <div class="flex flex-wrap mb-3 items-center w-full space-x-2">
    <!-- Add role -->
    @if (permissions.create) {
      <div class="ml-auto space-x-2">
        <p-button icon="pi pi-plus-circle" (click)="onStartCreation()" [disabled]="!permissions.create" aria-label="Nuevo libro"
          [attr.aria-disabled]="!permissions.create" rounded />
      </div>
    }
  </div>
  <p-panel class="shadow rounded-lg">

    <!-- List -->
    <access-role-list [loading]="loading" [editable]="permissions.edit" [deletable]="permissions.delete" [roles]="data.content"
      [rows]="data.size" [page]="data.page" [totalRecords]="data.totalElements" (show)="onShowInfo($event)"
      (delete)="onDelete($event)" (changeDirection)="onChangeDirection($event)" (changePage)="load($event)"
      (edit)="onStartEditing($event.role, $event.view)" (changePermissions)="onChangePermissions($event)" />

  </p-panel>

</div>

@switch (dialog) {
  @case (Dialog.INFO) {
    <p-drawer [visible]="dialog === Dialog.INFO" (visibleChange)="onDrawerVisibleChange($event)" [closable]="false" position="right">
      <ng-template #header>
        Rol
      </ng-template>
      <div class="w-full p-4">
        <access-role-info [data]="selectedData" />
      </div>
      <ng-template #footer>
        <p-button icon="pi pi-times" severity="secondary" (click)="dialog = Dialog.NONE" rounded text class="!p-2" />
      </ng-template>
    </p-drawer>
  }
  @case (Dialog.CREATE) {
    <p-drawer [visible]="dialog === Dialog.CREATE" (visibleChange)="onDrawerVisibleChange($event)" [closable]="false" position="right">
      <ng-template #header>
        Crear rol
      </ng-template>
      <div class="w-full p-4">
        <access-role-form [selection]="resourcePermissions" [loading]="loading" [failures]="failures" (save)="onCreate($event)" />
      </div>
      <ng-template #footer>
        <p-button icon="pi pi-times" severity="secondary" (click)="dialog = Dialog.NONE" rounded text class="!p-2" />
      </ng-template>
    </p-drawer>
  }
  @case (Dialog.PERMISSIONS) {
    <p-drawer [visible]="dialog === Dialog.PERMISSIONS" (visibleChange)="onDrawerVisibleChange($event)" [closable]="false" position="right">
      <ng-template #header>
        Asignar permisos
      </ng-template>
      <div class="w-full p-4">
        <access-role-change-permission [selection]="resourcePermissions" [permissions]="selectedData.permissions"
          (save)="onSetRolePermissions($event)" />
      </div>
      <ng-template #footer>
        <p-button icon="pi pi-times" severity="secondary" (click)="dialog = Dialog.NONE" rounded text class="!p-2" />
      </ng-template>
    </p-drawer>
  }
}
