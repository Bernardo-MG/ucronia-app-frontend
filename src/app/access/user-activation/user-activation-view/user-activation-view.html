
<div class="flex items-center justify-center p-4">
  @switch (step) {
    @case (Step.VALID_TOKEN) {
      <p-blockui [target]="userActivation" [blocked]="status.validating">
        <div>
          <i class="pi pi-spin pi-spinner" style="font-size: 3rem"></i>
        </div>
      </p-blockui>
      <p-card #userActivation>
        <ng-template #title>
          Activar usuario {{user.username}}
        </ng-template>
        <access-user-activation-form [failures]="failures" [loading]="status.loading" (save)="onActivateUser($event)" />
      </p-card>
    }
    @case (Step.INVALID_TOKEN) {
      <p-card>
        Token inválido
      </p-card>
    }
    @case (Step.FINISHED) {
      <p-card>
        Usuario activado
      </p-card>
    }
  }
</div>
