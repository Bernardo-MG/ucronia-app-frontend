<div class="flex items-center space-x-3">
  <div class="w-8 h-8 rounded-full border-2 border-green-600 flex items-center justify-center">
    <span class="{{icon()}} text-green-600 text-sm"></span>
  </div>

  <span class="font-medium">{{ name() }}</span>
</div>

<div class="mt-2">
  @if (loading()) {
      <p-skeleton />
    } @else {
    @if (value()) {
      <span class="text-green-700 font-semibold">{{ trueText() }}</span>
    } @else {
      <span class="text-red-600 font-semibold">{{ falseText() }}</span>
    }
  }
</div>
