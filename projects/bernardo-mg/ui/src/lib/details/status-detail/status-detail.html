<div class="flex gap-3 items-center">
  <div class="w-8 h-8 rounded-full border-2 border-{{color}} flex items-center justify-center">
    <span class="{{actualIcon}} text-{{color}} text-sm"></span>
  </div>
  <div>
    <p class="text-gray-500 text-sm">{{name()}}</p>

    @if (loading()) {
      <p-skeleton />
    } @else {
      <span class="font-semibold">{{ text }}</span>
    }
  </div>
</div>
